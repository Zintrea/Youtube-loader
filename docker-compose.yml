version: '3.8'

services:
  backend:
    build: ./backend-api
    ports:
      - "8000:8000"
    volumes:
      - downloads:/app/Downloads
    environment:
      - DOWNLOAD_DIR=/app/Downloads
      - CORS_ORIGINS=http://localhost:3000,http://localhost:8000
    restart: unless-stopped

  frontend:
    build: ./frontend-web
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  downloads:
